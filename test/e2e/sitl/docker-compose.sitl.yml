services:
  sitl:
    image: ${SITL_IMAGE:-qgc-px4-sitl:latest}
    container_name: ${SITL_CONTAINER_NAME:-qgc-e2e-sitl}
    ports:
      - "${SITL_MAVLINK_PORT:-5760}:${SITL_CONTAINER_PORT:-5760}"
    environment:
      - PX4_HOME_LAT=${PX4_HOME_LAT:-42.3898}
      - PX4_HOME_LON=${PX4_HOME_LON:--71.1476}
      - PX4_HOME_ALT=${PX4_HOME_ALT:-14}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${SITL_CONTAINER_PORT:-5760} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
