name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac
            artifact: mac
          - os: windows-latest
            script: build:win
            artifact: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build desktop app
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build server bundle
        run: npm run bundle:server

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 *.dmg *.exe meridian-server-*.zip 2>/dev/null > SHA256SUMS-${{ matrix.artifact }}.txt
          else
            sha256sum *.dmg *.exe meridian-server-*.zip 2>/dev/null > SHA256SUMS-${{ matrix.artifact }}.txt
          fi

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.exe
            dist/meridian-server-*.zip
            dist/SHA256SUMS-${{ matrix.artifact }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
