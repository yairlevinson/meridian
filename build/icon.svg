<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="156" y1="120" x2="868" y2="904" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14273a"/>
      <stop offset="0.48" stop-color="#091521"/>
      <stop offset="1" stop-color="#061018"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="44%" r="56%">
      <stop offset="0" stop-color="#2ee6d6" stop-opacity="0.24"/>
      <stop offset="0.52" stop-color="#2ee6d6" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#2ee6d6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="meridian" x1="260" y1="190" x2="764" y2="834" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#68fff0"/>
      <stop offset="0.58" stop-color="#28b8ff"/>
      <stop offset="1" stop-color="#3b6cff"/>
    </linearGradient>
    <linearGradient id="route" x1="254" y1="724" x2="770" y2="306" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffcf5c"/>
