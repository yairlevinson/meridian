<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0f1220"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#56ccf2"/>
      <stop offset="100%" stop-color="#2f80ed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#56ccf2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2f80ed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g fill="#ffffff" opacity="0.04">
    <circle cx="256" cy="256" r="3"/>
    <circle cx="384" cy="256" r="3"/>
    <circle cx="512" cy="256" r="3"/>
    <circle cx="640" cy="256" r="3"/>
    <circle cx="768" cy="256" r="3"/>
    <circle cx="256" cy="384" r="3"/>
    <circle cx="384" cy="384" r="3"/>
    <circle cx="640" cy="384" r="3"/>
    <circle cx="768" cy="384" r="3"/>
    <circle cx="256" cy="512" r="3"/>
    <circle cx="768" cy="512" r="3"/>
    <circle cx="256" cy="640" r="3"/>
    <circle cx="384" cy="640" r="3"/>
    <circle cx="640" cy="640" r="3"/>
    <circle cx="768" cy="640" r="3"/>
    <circle cx="256" cy="768" r="3"/>
    <circle cx="384" cy="768" r="3"/>
    <circle cx="512" cy="768" r="3"/>
    <circle cx="640" cy="768" r="3"/>
    <circle cx="768" cy="768" r="3"/>
  </g>

  <!-- Globe circle -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="url(#arc)" stroke-width="5" opacity="0.2"/>

  <!-- Meridian arc (vertical ellipse - the signature element) -->
  <ellipse cx="512" cy="512" rx="140" ry="280" fill="none" stroke="url(#arc)" stroke-width="5" opacity="0.35"/>

  <!-- Equator arc -->
  <ellipse cx="512" cy="512" rx="280" ry="80" fill="none" stroke="url(#arc)" stroke-width="4" opacity="0.15"/>

  <!-- Primary meridian line (vertical) -->
  <line x1="512" y1="220" x2="512" y2="804" stroke="url(#arc)" stroke-width="3" opacity="0.3"/>

  <!-- Crosshair horizontal -->
  <line x1="220" y1="512" x2="804" y2="512" stroke="url(#arc)" stroke-width="2" opacity="0.15"/>

  <!-- Vehicle/drone icon (stylized triangle pointing up) -->
  <g transform="translate(512, 430)">
    <!-- Glow under vehicle -->
    <ellipse cx="0" cy="12" rx="40" ry="8" fill="#56ccf2" opacity="0.15"/>
    <!-- Main body -->
    <path d="M 0,-52 L 22,20 L 0,10 L -22,20 Z" fill="url(#arc)" opacity="0.95"/>
    <!-- Wing accents -->
    <path d="M -22,20 L -48,28 L -18,12 Z" fill="#56ccf2" opacity="0.5"/>
    <path d="M 22,20 L 48,28 L 18,12 Z" fill="#56ccf2" opacity="0.5"/>
  </g>

  <!-- Waypoint path (dotted arc from vehicle to a point) -->
  <path d="M 512,442 Q 580,520 620,610" fill="none" stroke="#56ccf2" stroke-width="3" stroke-dasharray="8,8" opacity="0.4"/>

  <!-- Waypoint marker -->
  <g transform="translate(620, 610)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#56ccf2" stroke-width="3" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#56ccf2" opacity="0.9"/>
  </g>

  <!-- North indicator -->
  <g transform="translate(512, 175)" opacity="0.5">
    <text x="0" y="0" text-anchor="middle" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="36" font-weight="600" fill="#56ccf2" letter-spacing="4">N</text>
  </g>

  <!-- Compass ticks around globe -->
  <g stroke="#56ccf2" stroke-width="2.5" opacity="0.3">
    <!-- N -->
    <line x1="512" y1="222" x2="512" y2="242"/>
    <!-- S -->
    <line x1="512" y1="782" x2="512" y2="802"/>
    <!-- E -->
    <line x1="782" y1="512" x2="802" y2="512"/>
    <!-- W -->
    <line x1="222" y1="512" x2="242" y2="512"/>
  </g>
</svg>
