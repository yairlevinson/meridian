      <stop offset="1" stop-color="#ff6b5a"/>
    </linearGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.12  0 0 0 0 0.9  0 0 0 0 0.86  0 0 0 0.72 0"
      />
      <feMerge>
