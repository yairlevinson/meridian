    <ellipse cx="512" cy="512" rx="128" ry="298" fill="none" stroke="url(#meridian)" stroke-width="18" opacity="0.74"/>
    <ellipse cx="512" cy="512" rx="298" ry="86" fill="none" stroke="url(#meridian)" stroke-width="14" opacity="0.28"/>
    <path d="M 512 214 L 512 810" stroke="#bffdf7" stroke-width="10" stroke-linecap="round" opacity="0.42"/>
  </g>

